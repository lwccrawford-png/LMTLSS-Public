<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LMTLSS | Cave Night Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --gold:#F5C518;
      --gold-soft:#cda315;
      --bg:#070707;
      --panel:#171717;
      --panel-2:#1f1f20;
      --panel-3:#262628;
      --text:#ededed;
      --muted:#9a9a9f;
      --line:rgba(255,255,255,.06);
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:14px;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      color:var(--text);
      font-family:'Barlow',sans-serif;
      max-width:780px;
      margin:0 auto;
      padding:18px 14px 42px;
      background:#070707;
    }

    /* NAV */
    .nav{
      display:flex;
      justify-content:flex-end;
      margin-bottom:12px;
    }

    .nav a{
      padding:10px 14px;
      border-radius:8px;
      text-decoration:none;
      font-weight:700;
      background:var(--gold);
      color:#111;
      font-size:13px;
    }

    .hero{
      background:linear-gradient(135deg, #121212, #0c0c0c);
      border:1px solid rgba(245,197,24,.18);
      border-radius:18px;
      padding:34px 22px 26px;
      box-shadow:var(--shadow);
      text-align:center;
    }

    .brand{
      font-family:'Bebas Neue';
      font-size:62px;
      letter-spacing:4px;
      color:var(--gold);
    }

    .title{
      font-family:'Bebas Neue';
      font-size:42px;
      margin-top:8px;
    }

    .subtitle{
      margin-top:16px;
      color:#d9d9dd;
    }

    .subnote{
      margin-top:8px;
      font-size:11px;
      color:#6f6f74;
    }

    .intro{
      margin-top:18px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
    }

    .section-title{
      margin:26px 2px 14px;
      font-family:'Barlow Condensed';
      letter-spacing:3px;
      color:var(--gold);
    }

    .card{
      background:var(--panel);
      border-left:4px solid var(--gold);
      border-radius:14px;
      margin-bottom:14px;
    }

    .card-body{
      padding:16px;
    }

    .btn{
      display:inline-block;
      margin-top:10px;
      background:var(--gold);
      color:#111;
      padding:10px 12px;
      border-radius:8px;
      text-decoration:none;
      font-weight:700;
    }

    .footer-line{
      margin-top:28px;
      text-align:center;
      font-family:'Bebas Neue';
      color:var(--gold);
    }
  </style>
</head>

<body>

<!-- NEW NAV BUTTON -->
<div class="nav">
  <a href="https://www.wearelmtlss.com" target="_blank">Visit LMTLSS →</a>
</div>

<section class="hero">
  <div class="brand">LMTLSS</div>
  <div class="title">Cave Night Library</div>
  <div class="subtitle">Tools & Talks for Modern Men</div>
  <div class="subnote">All materials & resources © 2025 LMTLSS Manhood</div>
</section>

<section class="intro">
  A growing collection of Cave Night sessions organized by date and theme.
</section>

<div class="section-title">Sessions</div>

<div class="card">
  <div class="card-body">
    <strong>April 2026 — Flex On Them (Power)</strong><br>
    <a class="btn" href="./2026-04-power/">Enter Session →</a>
  </div>
</div>

<div class="footer-line">
  MEN AREN’T BORN. THEY’RE BUILT.
</div>

</body>
</html>
